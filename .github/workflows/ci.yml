name: ci

on:
  push:
  pull_request:

jobs:
  unit-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Test
        run: go test ./...

      - name: Build CLI (all targets)
        run: |
          GOOS=linux GOARCH=amd64 go build -o bcvpn-linux-amd64 ./cmd/bcvpn
          GOOS=darwin GOARCH=amd64 go build -o bcvpn-darwin-amd64 ./cmd/bcvpn
          GOOS=windows GOARCH=amd64 go build -o bcvpn-windows-amd64.exe ./cmd/bcvpn

      - name: Build GUI (native)
        run: go build -o bcvpn-gui ./cmd/bcvpn-gui

  linux-network-paths:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Linux networking integration-path tests
        run: go test -v ./internal/tunnel -run "TestLinux|TestLinuxConfigure"
