name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  GO_VERSION: "1.25.x"
  VERSION: "0.7.1"

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: make test

  build-release:
    needs: test-and-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          output="bcvpn-$GOOS-$GOARCH${ext}"
          go build -ldflags "-X blockchain-vpn/internal/version.Version=$VERSION -X blockchain-vpn/internal/version.GitCommit=$GITHUB_SHA -X blockchain-vpn/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o "$output" ./cmd/bcvpn

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bcvpn-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bcvpn-*

  github-release:
    needs: build-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          find artifacts -type f -name 'bcvpn*' | sort | xargs sha256sum > artifacts/SHA256SUMS
          cat artifacts/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: bcvpn v${{ env.VERSION }} (Beta)
          draft: true
          generate_release_notes: true
          body: |
            ## BlockchainVPN v${{ env.VERSION }} Beta

            This is a **beta release** of BlockchainVPN, a P2P VPN system powered by blockchain payments.

            ### What's New
            - Rating system with blockchain broadcast
            - Connection quality verification (75% bandwidth threshold)
            - Session spending limits enforcement
            - Multiple critical concurrency and security fixes
            - Interactive guided setup command (`bcvpn setup`)
            - Cross-platform builds (Linux, macOS, Windows)

            ### Binaries
            - `bcvpn-linux-amd64` - Linux x86_64
            - `bcvpn-linux-arm64` - Linux ARM64
            - `bcvpn-darwin-amd64` - macOS Intel
            - `bcvpn-darwin-arm64` - macOS Apple Silicon
            - `bcvpn-windows-amd64.exe` - Windows x86_64

            ### Known Limitations (Post-Beta)
            - No automatic reconnection on network disconnect
            - No cryptographic signature verification for reputation scores
            - Direct connect command is stub-only (use `bcvpn scan` to find providers)

            **Full Changelog**: https://github.com/rnts08/blockchain-vpn/compare/v0.4.9...v${{ env.VERSION }}
          files: |
            artifacts/bcvpn-linux-amd64/bcvpn-linux-amd64
            artifacts/bcvpn-linux-arm64/bcvpn-linux-arm64
            artifacts/bcvpn-darwin-amd64/bcvpn-darwin-amd64
            artifacts/bcvpn-darwin-arm64/bcvpn-darwin-arm64
            artifacts/bcvpn-windows-amd64/bcvpn-windows-amd64.exe
            artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
