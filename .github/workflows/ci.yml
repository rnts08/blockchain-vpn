name: ci

on:
  push:
  pull_request:

jobs:
  unit-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Test
        run: make test

      - name: Build CLI (all targets)
        run: make build-cli-all

      - name: Build GUI (native)
        run: make build-gui
